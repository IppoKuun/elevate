services:
  postgres:
    image: postgres:16-alpine
    container_name: ultime_ia_saas
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-ia_saas_db}
    
    ports:
    - "5432:5432"

    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./db/00_bootstrap.sql:/docker-entrypoint-initdb.d/00_bootstrap.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ia_saas_db}" ]
      interval: 5s
      timeout: 3s
      retries: 20
  redis:
    image : redis:7-alpine
    container_name: redis_saas
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports: 
    - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck :
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  redis-data:





